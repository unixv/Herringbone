<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herringbone Defense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <a href="{{ url_for('home') }}" class="menu-item" onclick="toggleSubMenu(this)">Home</a>
        <a href="#" class="menu-item" onclick="toggleSubMenu(this)">Log Ingestion</a>
        <div class="submenu">
            <a href="{{ url_for('events') }}">Events</a>
        </div>
    </div>
    <div class="content" id="content">
        <h1>Herringbone Defense</h1>
    </div>

    <script>
        function toggleSubMenu(element) {
            document.querySelectorAll('.submenu').forEach(submenu => {
                submenu.style.display = 'none';
            });
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });

            const submenu = element.nextElementSibling;
            if (submenu && submenu.classList.contains('submenu')) {
                submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
                element.classList.toggle('active');
            }
        }
    </script>
</body>
</html>
